<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Live Demo</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;

      button {
        padding: 12px 20px;

      }

      #status {
        margin-top: 20px;
        font-size: 18px;

      }

      pre {

  <body>
    <h1>Gemini Live API Template</h1>

    <p>Click the button below to connect to Gemini Live.</p>

    <pre id="log"></pre>

    <script src="/static/app.js"></script>
